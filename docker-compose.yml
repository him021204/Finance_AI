services:
  backend:
    build:
      context: ./server       # This tells Docker to look in your 'server' folder
      dockerfile: Dockerfile  # This tells it to run the Dockerfile inside that folder
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/.hf_cache
      - ./server/knowledge_base:/app/knowledge_base
    environment:
      - HOST=0.0.0.0
      - PORT=8000

  frontend:
    build:
      context: ./client       # This tells Docker to look in your 'client' folder
      dockerfile: Dockerfile  # This tells it to run the Dockerfile inside that folder
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  hf_cache: